[colors]
; Liquid Glass (60% opaque)
background = #99282828
background-alt = #993c3836
foreground = #ebdbb2
primary = #fabd2f
secondary = #83a598
alert = #fb4934
disabled = #928374

[bar/main]
width = 98%
height = 24pt
offset-x = 1%
offset-y = 1%
radius = 10
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
padding-left = 1
padding-right = 1
module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; Added font-1 for larger, clearer icons
font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

modules-left = xworkspaces
modules-center = nowplaying date
modules-right = memory cpu dunst

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.secondary}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-font = 2
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "󰝟 "
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-font = 2
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-font = 2
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = AC
poll-interval = 5
format-charging = <label-charging>
format-charging-prefix = "󱐋 "
format-charging-prefix-font = 2
format-charging-prefix-foreground = ${colors.primary}
format-discharging = <label-discharging>
format-discharging-prefix = "󰁹 "
format-discharging-prefix-font = 2
format-discharging-prefix-foreground = ${colors.secondary}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/dunst]
type = custom/script
exec = echo "󰂚 "
# This checks if dunst is paused and changes the icon
exec-if = pgrep -x dunst
interval = 5
format = <label>
label = %output%
label-foreground = ${colors.primary}

# Click to pause/unpause notifications
click-left = dunstctl set-paused toggle
# Middle click to close all active notifications
click-middle = dunstctl close-all

[module/nowplaying]
type = custom/script
interval = 1
# This combined script shows: Spinner | Title | Progress Bar
exec = /home/feribsd/.local/bin/polybar-nowplaying
format-prefix = " "
label = %output%
label-foreground = ${colors.secondary}

# Click to see the full notification
click-left = /home/feribsd/.local/bin/now-playing.sh
# Scroll to skip tracks
scroll-up = playerctl next
scroll-down = playerctl previous
